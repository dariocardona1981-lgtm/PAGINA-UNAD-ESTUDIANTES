<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Gestión Académica - UNAD</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background-color: #ffe07a;
    }

    /* ================= BARRA SUPERIOR ================= */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
    }

    .top-bar img {
      max-height: 110px;
    }

    .home-btn img {
      width: 60px;
      cursor: pointer;
    }

    /* ================= CONTENIDO ================= */
    .content {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 40px;
      padding: 30px 50px 60px;
    }

    /* Imagen izquierda */
    .left img {
      max-width: 90%;
      border: 20px solid #4a90e2;
      background: white;
      padding: 10px;
    }

    /* Botones derecha */
    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      align-content: start;
    }

    .btn {
      background-color: #167fae;
      color: white;
      padding: 18px;
      text-align: center;
      font-size: 18px;
      font-weight: bold;
      border-radius: 10px;
      cursor: pointer;
      transition: background-color 0.2s, transform 0.2s;
    }

    .btn:hover {
      background-color: #0f5f82;
      transform: translateY(-3px);
    }

    /* Botón grande final */
    .btn-full {
      grid-column: span 2;
      background-color: #167fae;
    }

    /* ================= RESPONSIVE ================= */
    @media (max-width: 900px) {
      .content {
        grid-template-columns: 1fr;
      }

      .buttons {
        grid-template-columns: 1fr;
      }

      .btn-full {
        grid-column: span 1;
      }
    }
  </style>
</head>

<body>

  <!-- ================= BARRA SUPERIOR ================= -->
  <header class="top-bar">

    <!-- Logo UNAD -->
    <img src="logo-UNAD.png" alt="Logo UNAD">

    <!-- Botón Inicio -->
    <a href="index.html">
      <div class="home-btn">
        <img src="inicio.png" alt="Volver al inicio">
      </div>
    </a>

  </header>

  <!-- ================= CONTENIDO ================= -->
  <main class="content">

    <!-- Imagen izquierda -->
    <div class="left">
      <img src="Gestión-académica.png" alt="Gestión Académica">
    </div>

    <!-- Botones -->
    <div class="buttons">

      <div class="btn">Matrícula y pagos</div>
      <div class="btn">Cambios de programa</div>

      <div class="btn">Costos</div>
      <div class="btn">Reingresos</div>

      <div class="btn">Acta de matrícula</div>
      <div class="btn">Homologaciones</div>

      <div class="btn">Cambio de cursos</div>
      <div class="btn">Aplazamientos</div>

      <div class="btn btn-full">
        Formatos de trámite (FUS)
      </div>

    </div>

  </main>

</body>
</html>
